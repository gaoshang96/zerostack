name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  build-static:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static binary (${{ matrix.target }})
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary with -static suffix
        run: |
          cp target/${{ matrix.target }}/release/zerostack \
             zerostack-${{ matrix.target }}-static

      - uses: actions/upload-artifact@v4
        with:
          name: zerostack-${{ matrix.target }}-static
          path: zerostack-${{ matrix.target }}-static
